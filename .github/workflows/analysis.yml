name: Analysis

on:
  workflow_dispatch:

jobs:
  analysis:
    runs-on: ubuntu-latest
    steps:
      - name: 下载数据
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo chenditc/investment_data --pattern "qlib_bin.tar.gz"
          mkdir -p ~/.qlib/qlib_data/cn_data
          tar -zxf qlib_bin.tar.gz -C ~/.qlib/qlib_data/cn_data --strip-components=1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt || echo "跳过"

      - name: 解压模型
        run: |
          cd ./roll && python ./roll.py model decompress_mlruns

      - name: 运行选股
        env:
          MLFLOW_ALLOW_FILE_STORE: "true"
        run: |
          cd ./roll && python ./roll.py model selection
          echo ""
          echo "========== 查找结果文件 =========="
          find ~/.qlibAssistant -name "*.csv" 2>/dev/null || echo "~/.qlibAssistant 下没有 csv 文件"
          find . -name "*.csv" 2>/dev/null | head -20
          echo ""
          echo "========== 当前目录内容 =========="
          ls -la
          echo ""
          echo "========== roll 目录内容 =========="
          ls -la ./roll/
          echo ""
          echo "========== 选股结果 =========="
          cat ~/.qlibAssistant/analysis/*.csv 2>/dev/null || echo "结果文件不存在"
